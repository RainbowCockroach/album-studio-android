name: Build & Release APK

# Every push to main builds a signed release APK and publishes it as THE single
# GitHub Release (previous releases are deleted first, so only the latest exists).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Allow the workflow to create releases and tags.
permissions:
  contents: write

# Never run two release builds at once; cancel an in-progress one if a newer push lands.
concurrency:
  group: release
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for version code)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compute version
        run: |
          VERSION_CODE=$(git rev-list --count HEAD)
          VERSION_NAME="1.0.${VERSION_CODE}"
          TAG="v${VERSION_NAME}"
          echo "VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_ENV"
          echo "VERSION_NAME=${VERSION_NAME}" >> "$GITHUB_ENV"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"
          echo "Building ${TAG} (versionCode ${VERSION_CODE})"

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "${RUNNER_TEMP}/release.jks"
          echo "KEYSTORE_FILE=${RUNNER_TEMP}/release.jks" >> "$GITHUB_ENV"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ env.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease

      - name: Stage APK
        run: |
          SRC=app/build/outputs/apk/release/app-release.apk
          test -f "$SRC" || { echo "APK not found at $SRC"; exit 1; }
          cp "$SRC" "to-print-${TAG}.apk"
          echo "APK=to-print-${TAG}.apk" >> "$GITHUB_ENV"

      - name: Remove previous releases (keep only the latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --json tagName --jq '.[].tagName' | while read -r tag; do
            [ -n "$tag" ] || continue
            echo "Deleting old release $tag"
            gh release delete "$tag" --cleanup-tag --yes || true
          done

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG" "$APK" \
            --title "$TAG" \
            --notes "Automated build of \`${GITHUB_SHA:0:7}\`. Download the APK below and install it — it updates any existing install in place (no uninstall needed)."
